          const [showCoachMode, setShowCoachMode] = useState(false);

          useEffect(() => {
            // Secret key to toggle coach mode (Press '1')
            const handleKeyDown = (e) => { if (e.key === '1') setShowCoachMode(prev => !prev); };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, []);

          const data = useMemo(() => {
            if (step !== 'result') return null;
            
            // Calculate 5 PCDEQ Scores
            const pcdeq = Object.entries(PCDEQ_MAPPING).map(([id, config]) => {
              const sum = config.items.reduce((acc, idx) => {
                const raw = answers[idx - 1] || 1; // Fallback to 1 if empty
                return acc + (config.reverse ? (7 - raw) : raw);
              }, 0);
              return { id, name: config.name, score: Number((sum / config.items.length).toFixed(2)) };
            });
            
            const fScores = pcdeq.reduce((acc, s) => ({ ...acc, [s.id]: s.score }), {});
            
            // MGI Formula calculation
            const mgi = Number(((fScores[1] * 0.25) + (fScores[4] * 0.30) + (fScores[3] * 0.25) + (fScores[5] * 0.20)).toFixed(2));
            
            // Extra indices calculation
            const extra = EXTRA_INDICES.map(idx => {
              const sum = idx.items.reduce((acc, qIdx) => {
                const raw = answers[qIdx - 1] || 1;
                return acc + (idx.reverse ? (7 - raw) : raw);
              }, 0);
              return { ...idx, score: Number((sum / idx.items.length).toFixed(2)) };
            });
            
            return { pcdeq, mgi, extra };
          }, [answers, step]);

          const ScoreCard = ({ title, score }) => {
            const stage = getStage(score);
            return (
              <div className="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm space-y-4 hover:shadow-md transition-shadow">
                <div className="flex justify-between items-start">
                  <h4 className="text-gray-500 text-[13px] font-bold tracking-tight">{title}</h4>
                  <span className="px-3 py-1 rounded-full text-[10px] font-bold border" style={{ borderColor: stage.color + '40', backgroundColor: stage.color + '10', color: stage.color }}>{stage.label}</span>
                </div>
                <div className="flex items-baseline gap-0.5">
                  <span className="text-3xl font-black text-gray-900">{score.toFixed(1)}</span>
                  <span className="text-sm font-bold text-gray-300">/6</span>
                </div>
                <div className="h-2.5 w-full bg-gray-100 rounded-full overflow-hidden shadow-inner">
                  <motion.div initial={{ width: 0 }} animate={{ width: `${(score/6)*100}%` }} transition={{ duration: 1, ease: "easeOut" }} className="h-full" style={{ backgroundColor: stage.color }} />
                </div>
              </div>
            );
          };

          const DetailCard = ({ dataId, itemData }) => {
            const stage = getStage(itemData.score);
            const config = DETAIL_CONTENT[dataId] || { meaning: '준비 중입니다.', weakness: [], guide: [] };
            
            return (
              <div className="bg-white rounded-[3.5rem] border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300">
                <div className="p-10 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                  <div className="flex items-center gap-5">
                    <div className="p-4 bg-white rounded-2xl text-indigo-600 shadow-sm border border-gray-50">{itemData.icon || <Info size={24}/>}</div>
                    <h3 className="font-black text-gray-900 text-xl">{itemData.name}</h3>
                  </div>
                  <div className="text-right">
                    <div className="flex items-baseline gap-0.5 justify-end">
                      <span className="text-3xl font-black text-gray-900">{itemData.score.toFixed(1)}</span>
                      <span className="text-base font-bold text-gray-300">/6</span>
                    </div>
                    <div className="text-[11px] font-black tracking-widest uppercase mt-1" style={{ color: stage.color }}>{stage.label}</div>
                  </div>
                </div>
                <div className="p-10 space-y-8">
                  <div className="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-inner">
                    <h4 className="text-[11px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-3">INDICATOR MEANING</h4>
                    <p className="text-[15px] text-gray-700 font-medium leading-relaxed break-keep">{config.meaning}</p>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-2">
                    <div className="space-y-4 bg-red-50/30 p-8 rounded-[2.5rem] border border-red-100/30">
                      <h4 className="text-[13px] font-black text-red-500 flex items-center gap-2"><AlertCircle size={16}/> 이럴 때 흔들려요</h4>
                      <ul className="text-[13px] text-gray-700 space-y-2.5 list-disc pl-4 font-medium">{config.weakness?.map((w, i) => <li key={i} className="break-keep">{w}</li>)}</ul>
                    </div>
                    <div className="space-y-4 bg-emerald-50/30 p-8 rounded-[2.5rem] border border-emerald-100/30">
                      <h4 className="text-[13px] font-black text-emerald-600 flex items-center gap-2"><TrendingUp size={16}/> 더 나아지는 방법</h4>
                      <ul className="text-[13px] text-gray-700 space-y-2.5 list-disc pl-4 font-medium">{config.guide?.map((g, i) => <li key={i} className="break-keep">{g}</li>)}</ul>
                    </div>
                  </div>
                  <div className="pt-8 text-center border-t border-gray-50">
                    <p className="text-[11px] text-gray-400 font-bold italic tracking-tight opacity-80">"내 마음의 소리에 귀 기울일 때 더 큰 성장이 찾아옵니다. ⚽️"</p>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-white font-[Pretendard]">
              <AnimatePresence mode="wait">
                {step === 'intro' && <Intro key="intro" onNext={() => setStep('profile')} />}
                {step === 'profile' && <ProfileForm key="profile" profile={profile} setProfile={setProfile} onNext={() => setStep('survey')} />}
                {step === 'survey' && <Survey key="survey" answers={answers} setAnswers={setAnswers} onSubmit={() => { if (answers.includes(0)) alert("아직 답변하지 않은 문항이 있어요. 모든 문항을 확인해주세요! ✨"); else setStep('result'); }} />}
                
                {step === 'result' && data && (
                  <motion.div key="result" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="bg-[#FDFDFF] min-h-screen">
                    <header className="bg-white border-b border-gray-100 sticky top-0 z-30 px-6 py-6 shadow-sm">
                      <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-6 justify-between items-center">
                        <div className="flex items-center gap-5">
                          <div className="w-14 h-14 bg-indigo-600 rounded-[1.25rem] flex items-center justify-center text-white font-black text-2xl shadow-indigo-200 shadow-xl">{profile.name[0] || '선'}</div>
                          <div><h1 className="font-black text-gray-900 text-xl tracking-tight">{profile.name} 선수 멘탈 리포트</h1><p className="text-[11px] text-gray-400 font-black tracking-[0.3em] uppercase mt-0.5">ID: {profile.chartNo || 'ANONYMOUS-ATHLETE'}</p></div>
                        </div>
                        <nav className="flex bg-gray-100 p-2 rounded-[1.5rem] shadow-inner overflow-x-auto">
                          {['summary', 'personal', 'coach'].map(t => (t !== 'coach' || showCoachMode) && (
                            <button key={t} onClick={() => setActiveTab(t)} className={`whitespace-nowrap px-7 py-2.5 rounded-[1.1rem] text-xs font-black transition-all duration-300 ${activeTab === t ? 'bg-white shadow-lg text-indigo-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                              {t === 'summary' ? '나의 멘탈 요약' : t === 'personal' ? '멘탈 성장 가이드' : '지도자 전용 리포트'}
                            </button>
                          ))}
                        </nav>
                      </div>
                    </header>
                    
                    <main className="max-w-6xl mx-auto p-6 space-y-16 mt-8">
                      {activeTab === 'summary' && (
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-16">
                          <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                            <div className="lg:col-span-2 bg-white p-8 md:p-12 rounded-[3.5rem] shadow-sm h-[520px] border border-gray-100">
                              <div className="flex flex-col md:flex-row justify-between items-start mb-4 md:mb-10 gap-4">
                                <div className="space-y-1">
                                  <h3 className="text-2xl font-black text-gray-900 flex items-center gap-3 tracking-tighter"><ClipboardCheck className="text-indigo-500" size={28}/> 5대 핵심 멘탈지수</h3>
                                  <p className="text-[11px] text-indigo-400 font-black tracking-widest uppercase">Mental Performance Radar Chart</p>
                                </div>
                                <p className="text-[12px] text-gray-400 font-bold max-w-[200px] md:text-right break-keep leading-tight">내 마음의 강점과 앞으로 더 채워야 할 곳을 한 눈에 확인하세요.</p>
                              </div>
                              <div className="h-[300px] md:h-[360px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                  <RadarChart cx="50%" cy="50%" outerRadius="70%" data={data.pcdeq.map(s => ({ name: s.name, score: s.score }))}>
                                    <PolarGrid stroke="#F3F4F6" strokeWidth={2} />
                                    <PolarAngleAxis dataKey="name" tick={{ fontSize: 11, fontWeight: 800, fill: '#4B5563' }} />
                                    <PolarRadiusAxis domain={[0, 6]} tick={false} axisLine={false} />
                                    <Radar name="Score" dataKey="score" stroke="#4F46E5" fill="#4F46E5" fillOpacity={0.3} strokeWidth={4} dot={{ r: 5, fill: '#4F46E5', strokeWidth: 2, stroke: '#fff' }} />
                                  </RadarChart>
                                </ResponsiveContainer>
                              </div>
                            </div>
                            <div className="bg-gradient-to-br from-indigo-950 via-indigo-900 to-indigo-800 text-white p-12 rounded-[3.5rem] flex flex-col justify-center text-center space-y-8 shadow-2xl relative overflow-hidden group h-[520px]">
                              <div className="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-110 transition-transform duration-700"><TrendingUp size={200}/></div>
                              <h3 className="text-indigo-300 text-[13px] font-black uppercase tracking-[0.3em] relative z-10">Mental Growth Index</h3>
                              <div className="flex items-baseline justify-center gap-1 relative z-10">
                                <span className="text-8xl md:text-9xl font-black tracking-tighter leading-none">{data.mgi.toFixed(1)}</span>
                                <span className="text-2xl md:text-3xl font-bold text-indigo-400/60">/6</span>
                              </div>
                              <div className="space-y-5 pt-4 relative z-10">
                                <div className="px-8 py-2.5 bg-white/10 rounded-full text-xs font-black inline-block backdrop-blur-xl border border-white/20 shadow-xl">{getStage(data.mgi).label} 성장 영역</div>
                                <p className="text-[13px] text-indigo-100 leading-relaxed font-bold break-keep px-2 md:px-6">지금 실력보다 내일의 가능성을 보여주는 특별한 점수입니다! 🚀</p>
                              </div>
                            </div>
                          </div>
                          <div className="space-y-8 pb-20">
                            <h3 className="text-2xl font-black text-gray-900 flex items-center gap-3 px-2 tracking-tight"><Activity className="text-indigo-500" size={30}/> 상황별 상세 분석 데이터</h3>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                              {data.extra.map(ex => <ScoreCard key={ex.id} title={ex.name} score={ex.score} />)}
                            </div>
                          </div>
                        </motion.div>
                      )}
                      
                      {activeTab === 'personal' && (
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="grid grid-cols-1 lg:grid-cols-2 gap-12 pb-32">
                          <DetailCard dataId="1" itemData={{...data.pcdeq[0], icon: <Zap size={24}/>}} />
                          <DetailCard dataId="mgi" itemData={{name: 'MGI 멘탈 성장지수', score: data.mgi, icon: <TrendingUp size={24}/>}} />
                          {data.extra.map(ex => <DetailCard key={ex.id} dataId={ex.id} itemData={ex} />)}
                        </motion.div>
                      )}
                      
                      {activeTab === 'coach' && showCoachMode && (
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-12 pb-32">
                          <div className="bg-amber-50 border border-amber-200 p-8 md:p-10 rounded-[3rem] flex flex-col md:flex-row items-start md:items-center gap-6 md:gap-8 text-amber-900 font-bold shadow-sm">
                            <div className="p-5 bg-amber-100 rounded-[2rem] text-amber-600 shadow-inner shrink-0"><Lock size={32}/></div>
                            <div>
                              <p className="text-xl md:text-2xl font-black tracking-tight">전문가용 심층 코칭 리포트</p>
                              <p className="text-xs md:text-sm text-amber-700 font-bold opacity-80 mt-1 uppercase tracking-wider">For Coaches & Mental Trainers Only</p>
                              <p className="text-xs text-amber-600 font-medium mt-3 break-keep">이 탭은 지도자의 코칭 방향성 설정을 돕기 위한 데이터입니다. 선수나 학부모에게 직접 노출될 경우 부담을 줄 수 있으므로 활용에 주의해 주세요.</p>
                            </div>
                          </div>
                          
                          {data.pcdeq.map((s, i) => {
                            const stageLabel = getStage(s.score).label;
                            const coachData = COACH_CONTENT[s.id]?.[stageLabel] || { interpretation: "데이터 부족", behavior: "데이터 부족", guide: "평가 점수를 기반으로 개별 면담을 진행하세요." };
                            
                            return (
                              <div key={s.id} className="bg-white rounded-[3rem] md:rounded-[4rem] shadow-sm overflow-hidden p-8 md:p-14 border border-gray-100 md:border-l-[20px] border-l-[12px] hover:shadow-xl transition-all duration-500" style={{ borderLeftColor: getStage(s.score).color }}>
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 md:mb-12 gap-4">
                                  <h3 className="font-black text-gray-900 text-2xl md:text-3xl tracking-tighter">{i+1}. {s.name}</h3>
                                  <div className="flex items-baseline gap-1">
                                    <span className="text-4xl md:text-5xl font-black" style={{color: getStage(s.score).color}}>{s.score.toFixed(2)}</span>
                                    <span className="text-lg md:text-xl font-bold text-gray-200">/6.0</span>
                                  </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-14 text-sm">
                                  <div className="space-y-8 md:space-y-10">
                                    <div className="bg-gray-50/80 p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-gray-100 shadow-inner">
                                      <h4 className="font-black text-gray-900 mb-4 md:mb-5 flex items-center gap-3 text-base md:text-lg"><User size={20} className="text-indigo-500"/> 전문가 임상 해석</h4>
                                      <p className="text-gray-600 leading-relaxed font-bold break-keep text-[14px] md:text-[15px]">{coachData.interpretation}</p>
                                    </div>
                                    <div className="bg-gray-50/80 p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-gray-100 shadow-inner">
                                      <h4 className="font-black text-gray-900 mb-4 md:mb-5 flex items-center gap-3 text-base md:text-lg"><Activity size={20} className="text-indigo-500"/> 훈련 현장 관찰 포인트</h4>
                                      <p className="text-gray-600 leading-relaxed font-bold break-keep text-[14px] md:text-[15px]">{coachData.behavior}</p>
                                    </div>
                                  </div>
                                  <div className="bg-indigo-600 p-10 md:p-14 rounded-[2.5rem] md:rounded-[4rem] text-white shadow-2xl flex flex-col justify-center border-[6px] md:border-8 border-indigo-500 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:rotate-12 transition-transform duration-1000"><Target size={200}/></div>
                                    <h4 className="font-black text-indigo-100 mb-6 md:mb-8 text-xl md:text-2xl flex items-center gap-3 md:gap-5 relative z-10"><Target size={26} className="text-white"/> 지도 액션 플랜</h4>
                                    <p className="text-base md:text-lg font-black leading-relaxed break-keep opacity-95 relative z-10">{coachData.guide}</p>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </motion.div>
                      )}
                    </main>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>
          );
        }

        // --- 렌더링 ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
